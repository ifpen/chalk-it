<!DOCTYPE html>
<html lang="en">
  <head>
    <base href="{{base_url}}" />
    <title>Chalk'it - App</title>
    <meta http-equiv="Cache-control" content="no-store, no-cache, must-revalidate" />
    <meta name="robots" content="nosnippet, noindex" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="shared.taipy-gui-base.js"></script>
    <script src="preview.taipy-gui-base.js"></script>
  </head>

  <body ng-app="xCLOUD" class="nav-sm" id="app">
    <div id="loading-overlay" ng-class="{'hidden':!isLoading}">
      <div class="wrapperloading">
        <div class="loading up"></div>
        <div class="loading down"></div>
      </div>
    </div>
    <div id="nav_bar" style="display: none;" ng-style="{'display': 'block'}"></div>
    <div class="panel-body" style="padding: 0px" ng-controller="DashboardController">
      <div class="dashboard-parent-container">
        <div class="dashboard-page-container" style="margin-left: auto; margin-right: auto;">
          <div id="DropperDroitec" class="dropperR dashboard-content-container">
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    let isAvailableCookie = true;
    const allCookies = document.cookie;
    if (!allCookies) {
      isAvailableCookie = false;
    } else {
      const cookiesArray = allCookies.split(';');
      isAvailableCookie = cookiesArray.some((cookie) => {
        // Trim any leading whitespace and split the cookie into name and value
        const [name, value] = cookie.trim().split('=');
        // Check if the cookie name matches the one we're looking for
        return name === 'tprh';
      });
    }
    if (!isAvailableCookie) {
      window.location.reload();
    }
  </script>
</html>
